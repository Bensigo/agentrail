<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- Faithful-in-spirit rendition of Telegram's default doodle wallpaper
       texture (owner reference screenshot, 2026-07-22): simple line-art
       objects, tone-on-tone, tiled beneath the chat. Consumed by
       lib/telegram-surface.ts as the phone demo's background layer. -->
  <g fill="none" stroke="#14523e" stroke-opacity="0.13" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- balloon -->
    <circle cx="34" cy="30" r="9"/>
    <path d="M34 39c-3 4 3 6 0 10"/>
    <!-- heart -->
    <path d="M150 34c-5-7-14-2-9 6l9 9 9-9c5-8-4-13-9-6z"/>
    <!-- star -->
    <path d="M206 28l2.6 5.6 6.2.7-4.6 4.2 1.3 6-5.5-3.2-5.5 3.2 1.3-6-4.6-4.2 6.2-.7z"/>
    <!-- cloud -->
    <path d="M26 122a8 8 0 0 1 7-12 11 11 0 0 1 20-1 8 8 0 0 1 5 13z"/>
    <!-- duck -->
    <circle cx="103" cy="84" r="5"/>
    <path d="M108 83l6 1-5 3"/>
    <path d="M101 89c-7 9 3 12 9 10 5-1 7-5 6-9"/>
    <!-- fish -->
    <path d="M172 82c6-6 16-6 22 0-6 6-16 6-22 0z"/>
    <path d="M194 82l9-7v14z"/>
    <circle cx="179" cy="81" r="0.8"/>
    <!-- ice-cream -->
    <circle cx="212" cy="148" r="7"/>
    <path d="M205 152h14l-7 18z"/>
    <!-- lightning -->
    <path d="M126 140l-9 15h7l-7 14"/>
    <!-- bone -->
    <circle cx="60" cy="184" r="4"/>
    <circle cx="60" cy="192" r="4"/>
    <circle cx="84" cy="184" r="4"/>
    <circle cx="84" cy="192" r="4"/>
    <path d="M63 186h18M63 190h18"/>
    <!-- flower -->
    <circle cx="152" cy="192" r="3"/>
    <circle cx="152" cy="184" r="4"/>
    <circle cx="159" cy="189" r="4"/>
    <circle cx="157" cy="198" r="4"/>
    <circle cx="147" cy="198" r="4"/>
    <circle cx="145" cy="189" r="4"/>
    <!-- crescent moon -->
    <path d="M28 210a11 11 0 1 0 12 16 9 9 0 1 1-12-16z"/>
    <!-- music note -->
    <path d="M198 228v-16l12-4v15"/>
    <circle cx="195" cy="228" r="3.4"/>
    <circle cx="207" cy="223" r="3.4"/>
    <!-- paw -->
    <circle cx="88" cy="38" r="5"/>
    <circle cx="81" cy="31" r="2.4"/>
    <circle cx="88" cy="28" r="2.4"/>
    <circle cx="95" cy="31" r="2.4"/>
    <!-- gift -->
    <path d="M112 206h22v16h-22zM112 212h22M123 206v16M118 206c-5-2-5-8 0-7 4 1 5 5 5 7 0-2 1-6 5-7 5-1 5 5 0 7"/>
    <!-- umbrella -->
    <path d="M52 66a14 14 0 0 1 28 0c-5-3-9-3-14 0-5-3-9-3-14 0zM66 66v14c0 4-6 4-6 1"/>
  </g>
</svg>
