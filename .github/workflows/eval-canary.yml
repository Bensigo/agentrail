name: Eval canary

# Nightly canary (issue #1041). A SEPARATE scheduled workflow — it does NOT
# touch the PR-time CI (ci.yml). Each night it runs a bounded eval corpus
# subset (one task per difficulty stratum), writes the dated report
# eval-report-YYYY-MM-DD.md (strata + per-component cost + network-artifact
# counts), and pushes per-arm run/pack telemetry to the linked AgentRail
# server so the regression gate's live-metrics lane is not dark.
#
# FAIL-CLOSED AUTH (PRD §5): the three AGENTRAIL_SERVER_* secrets are required.
# When any is missing/empty, `agentrail evals canary` raises CanaryAuthError and
# exits non-zero — the job turns RED. It never runs unauthenticated or against a
# partial corpus that would false-green the loop. This is the deliberate
# opposite of the GitHub webhook's fail-OPEN skip.

on:
  # AC1: the scheduled trigger produces a dated report on its own. 07:00 UTC
  # nightly — off-peak, once a day, cheap (see the documented cost bound).
  schedule:
    - cron: "0 7 * * *"
  # Manual trigger for a one-off run / verification (does NOT replace the
  # scheduled run — AC1 requires a real scheduled run link).
  workflow_dispatch:

permissions:
  contents: write   # to commit the dated report back to the repo

concurrency:
  # Never overlap two canary runs (a slow run must not collide with the next
  # night's), and never cancel an in-flight run — let it finish and push.
  group: eval-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the package so the eval harness + its dependencies are present.
      - name: install
        run: python -m pip install --upgrade pip -e .

      # AC1/AC2/AC3: run the bounded canary. The three AGENTRAIL_SERVER_* secrets
      # are passed as env; the CLI resolves them via load_link and FAILS CLOSED
      # (non-zero exit) if any is unset — so a misconfigured secret turns this
      # job red rather than silently producing dark, unauthenticated telemetry.
      - name: run canary
        env:
          AGENTRAIL_SERVER_BASE_URL: ${{ secrets.AGENTRAIL_SERVER_BASE_URL }}
          AGENTRAIL_SERVER_API_KEY: ${{ secrets.AGENTRAIL_SERVER_API_KEY }}
          AGENTRAIL_SERVER_REPOSITORY_ID: ${{ secrets.AGENTRAIL_SERVER_REPOSITORY_ID }}
        run: python -m agentrail.cli.main evals canary --target .

      # AC1: commit the dated report the canary just produced, so a scheduled
      # run leaves a durable eval-report-YYYY-MM-DD.md on the default branch.
      # Skips cleanly when nothing changed (e.g. a re-run on the same date).
      - name: commit dated report
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          git config user.name "agentrail-canary[bot]"
          git config user.email "canary@agentrail.dev"
          git add agentrail/evals/reports/eval-report-*.md
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore(evals): nightly canary report $(date -u +%F)"
            git push
          fi
